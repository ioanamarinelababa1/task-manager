<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Notebook back cover -->
  <rect x="5" y="3" width="22" height="26" rx="3" fill="#4f46e5"/>
  <!-- Spine -->
  <rect x="5" y="3" width="6" height="26" rx="2" fill="#3730a3"/>
  <!-- Page -->
  <rect x="9" y="3" width="18" height="26" rx="2" fill="#ede9fe"/>
  <!-- Spiral rings -->
  <circle cx="9" cy="9"  r="2" fill="none" stroke="#7c3aed" strokeWidth="1.5"/>
  <circle cx="9" cy="16" r="2" fill="none" stroke="#7c3aed" strokeWidth="1.5"/>
  <circle cx="9" cy="23" r="2" fill="none" stroke="#7c3aed" strokeWidth="1.5"/>
  <!-- Text lines -->
  <rect x="13" y="8"  width="10" height="2" rx="1" fill="#7c3aed" opacity="0.5"/>
  <rect x="13" y="12" width="12" height="2" rx="1" fill="#7c3aed" opacity="0.5"/>
  <rect x="13" y="16" width="9"  height="2" rx="1" fill="#7c3aed" opacity="0.5"/>
  <rect x="13" y="20" width="11" height="2" rx="1" fill="#7c3aed" opacity="0.5"/>
  <rect x="13" y="24" width="7"  height="2" rx="1" fill="#7c3aed" opacity="0.5"/>
</svg>
